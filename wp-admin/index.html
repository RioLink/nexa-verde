<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="generator" content="WordPress 6.8.2"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Увійти ‹ Nexa Verde — WordPress</title>
  <link rel="stylesheet" href="/wp-content/themes/nexa-verde/assets/css/style.css"/>
  <script defer src="/wp-content/themes/nexa-verde/assets/js/main.js"></script>
</head>
<body class="wp-login-body">
  <main class="wp-login-page">
    <div class="wp-login-logo" aria-label="WordPress">W</div>
    <form id="loginForm" class="wp-login-form">
      <div id="loginError" class="wp-login-error">Помилка: введені дані не підключені до реальної CMS. Це демонстраційна сторінка входу.</div>
      <label for="user_login">Ім'я користувача або Email адреса</label>
      <input id="user_login" name="log" type="text" autocomplete="username">
      <label for="user_pass">Пароль</label>
      <div class="password-wrap">
        <input id="user_pass" name="pwd" type="password" autocomplete="current-password">
        <button type="button" class="toggle-pass" aria-label="Показати пароль">◉</button>
      </div>
      <div class="login-row">
        <label class="remember"><input type="checkbox" name="rememberme"> Запам'ятати мене</label>
        <button class="wp-submit" type="submit">Увійти</button>
      </div>
    </form>
    <p class="wp-links"><a href="#">Втратили свій пароль?</a></p>
    <p class="wp-links"><a href="/">← Назад до Nexa Verde</a></p>
    <p class="privacy-page-link"><a href="#">Політика конфіденційності</a></p>
    <div class="language-switcher">
      <span>▣</span>
      <select><option>Українська</option><option>English (United States)</option></select>
      <button>Змінити</button>
    </div>
  </main>
</body>
</html>
