<!doctype html>
<html lang="uk"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="robots" content="noindex, nofollow"/><title>Увійти ‹ Nexa Verde</title><link rel="stylesheet" href="/wp-content/themes/nexa-verde/assets/css/style.css"/><script defer src="/wp-content/themes/nexa-verde/assets/js/main.js"></script></head>
<body class="wp-login-body"><main class="wp-login-page"><div class="wp-login-logo">W</div><form id="loginForm" class="wp-login-form"><div id="loginError" class="wp-login-error">Помилка: неправильний логін або пароль.</div><label for="user_login">Ім'я користувача або Email адреса</label><input id="user_login" type="text" autocomplete="username"><label for="user_pass">Пароль</label><div class="password-wrap"><input id="user_pass" type="password" autocomplete="current-password"><button type="button" class="toggle-pass" aria-label="Показати пароль">◉</button></div><div class="login-row"><label class="remember"><input type="checkbox"> Запам'ятати мене</label><button class="wp-submit" type="submit">Увійти</button></div></form><p class="wp-links"><a href="#" id="lostPasswordLink">Втратили пароль?</a></p><p class="wp-links"><a href="/">← Назад до Nexa Verde</a></p></main><div class="wp-modal" id="passwordModal" aria-hidden="true"><div class="wp-modal-backdrop" data-modal-close></div><div class="wp-modal-card" role="dialog" aria-modal="true" aria-labelledby="passwordModalTitle"><button class="wp-modal-close" type="button" data-modal-close aria-label="Закрити">×</button><h2 id="passwordModalTitle">Відновлення пароля</h2><p>Це демо-вікно. У реальній CMS тут буде відправка листа для скидання пароля.</p><form id="recoverForm" class="recover-form"><label for="recover_email">Ім'я користувача або Email адреса</label><input id="recover_email" type="text" autocomplete="email"><button class="wp-submit" type="submit">Отримати новий пароль</button></form><div id="recoverMessage" class="wp-modal-message">Заглушка: інструкцію не відправлено, бо CMS не підключена.</div></div></div></body></html>
